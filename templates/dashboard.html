<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tradelab live</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font:
          14px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        background: #0f172a;
        color: #e2e8f0;
      }

      header {
        padding: 16px 24px;
        border-bottom: 1px solid #1e293b;
        display: flex;
        gap: 24px;
        align-items: baseline;
      }

      h1 {
        font-size: 16px;
        margin: 0;
        color: #38bdf8;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 24px;
      }

      .card {
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 8px;
        padding: 16px;
      }

      .card h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
        margin: 0 0 12px;
      }

      .big {
        font-size: 28px;
        font-weight: 600;
      }

      .pos {
        color: #4ade80;
      }

      .neg {
        color: #f87171;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 320px;
        overflow: auto;
      }

      li {
        padding: 6px 0;
        border-bottom: 1px solid #1e293b;
        display: flex;
        gap: 12px;
      }

      .halt {
        color: #fbbf24;
      }

      time {
        color: #475569;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>tradelab live</h1>
      <span id="symbol">-</span>
      <span id="conn">connecting...</span>
    </header>
    <div class="grid">
      <div class="card">
        <h2>Equity</h2>
        <div class="big" id="equity">-</div>
        <div>Day PnL: <span id="dayPnl">-</span></div>
      </div>
      <div class="card">
        <h2>Open position</h2>
        <div id="position">flat</div>
      </div>
      <div class="card">
        <h2>Risk</h2>
        <div id="risk">-</div>
      </div>
      <div class="card">
        <h2>Recent events</h2>
        <ul id="events"></ul>
      </div>
    </div>
    <script>
      const fmt = (n) =>
        typeof n === "number" ? n.toLocaleString(undefined, { maximumFractionDigits: 2 }) : "-";

      function applyState(s) {
        document.getElementById("symbol").textContent = s.symbol ?? s.id ?? "portfolio";
        document.getElementById("equity").textContent = fmt(s.equity);
        const dp = document.getElementById("dayPnl");
        dp.textContent = fmt(s.dayPnl);
        dp.className = (s.dayPnl ?? 0) >= 0 ? "pos" : "neg";
        const p = s.openPosition;
        document.getElementById("position").textContent = p
          ? `${p.side} ${fmt(p.size)} @ ${fmt(p.entryFill ?? p.entry)} | uPnL ${fmt(p.unrealizedPnl)}`
          : "flat";
        document.getElementById("risk").textContent = s.risk ? JSON.stringify(s.risk) : "ok";
      }

      async function pollState() {
        try {
          applyState(await (await fetch("/state")).json());
        } catch {}
      }

      pollState();
      setInterval(pollState, 3000);

      const list = document.getElementById("events");
      const es = new EventSource("/events");
      es.onopen = () => (document.getElementById("conn").textContent = "live");
      es.onerror = () => (document.getElementById("conn").textContent = "disconnected");
      es.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        const li = document.createElement("li");
        const halt = msg.event.startsWith("risk:");
        li.innerHTML =
          "<time>" +
          new Date(msg.t).toLocaleTimeString() +
          "</time>" +
          '<span class="' +
          (halt ? "halt" : "") +
          '">' +
          msg.event +
          "</span>" +
          "<span>" +
          (msg.payload?.symbol ?? "") +
          "</span>";
        list.prepend(li);
        while (list.children.length > 100) list.removeChild(list.lastChild);
        if (["equity:update", "position:opened", "position:closed"].includes(msg.event))
          pollState();
      };
    </script>
  </body>
</html>
